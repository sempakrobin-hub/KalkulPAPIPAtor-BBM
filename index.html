<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator BBM Cloud Pro - Map & Gemini Check</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #14161d; color: #ffffff; font-family: 'Arial', sans-serif; }
        .dot { transition: all 0.3s ease-in-out; }
        input:checked ~ .dot { transform: translateX(100%); background-color: #ffffff; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-5xl flex flex-col lg:flex-row gap-6 items-start justify-center">
        
        <!-- PANEL KIRI (Form Utama) -->
        <div id="main_card" class="w-full lg:w-[420px] bg-[#1e222b] border border-gray-700 shadow-2xl rounded-xl overflow-hidden flex flex-col p-4 space-y-3.5">
            <div class="flex items-center gap-1.5 w-full">
                <div class="flex-1 flex items-center bg-[#2d323f] rounded px-3 py-1.5 text-[11px] font-bold text-[#a0a5b5]">
                    <span class="w-12">PLAT</span>
                    <input type="text" id="entry_plat" class="w-full bg-transparent text-white uppercase outline-none" placeholder="Klik untuk Auto-Paste">
                </div>
                <button onclick="cekPlat()" id="btn_cek" class="bg-[#ff9f0a] text-white px-3 py-2 rounded text-[11px] font-bold w-14">CEK</button>
            </div>
            
            <div class="flex items-center bg-[#2d323f] rounded px-3 py-1.5 text-[11px] font-bold text-[#a0a5b5]">
                <span class="w-12">START</span>
                <input type="text" id="entry_start" class="w-full bg-transparent text-white outline-none">
            </div>

            <div class="flex items-center bg-[#2d323f] rounded px-3 py-1.5 text-[11px] font-bold text-[#a0a5b5]">
                <span class="w-12">AKHIR</span>
                <input type="text" id="entry_akhir" class="w-full bg-transparent text-white outline-none">
            </div>

            <div class="flex items-center bg-[#2d323f] rounded px-3 py-1.5 text-[11px] font-bold text-[#a0a5b5]">
                <span class="w-12">LITER</span>
                <input type="text" id="entry_liter" class="w-full bg-transparent text-white outline-none">
            </div>

            <div class="grid grid-cols-3 gap-1.5 pt-1 text-[11px] font-bold">
                <button onclick="hitungRasio()" class="bg-[#34c759] text-white py-2 rounded">HITUNG</button>
                <button onclick="simpanKeCloud()" id="btn_save" class="bg-[#3a3f4d] text-white py-2 rounded">SAVE</button>
                <button onclick="resetForm()" class="bg-[#3a3f4d] text-gray-300 py-2 rounded">RESET</button>
            </div>
        </div>

        <!-- PANEL KANAN (Gemini & Preview) -->
        <div class="flex-1 w-full bg-[#1e222b] border border-gray-700 shadow-2xl rounded-xl p-4 flex flex-col space-y-3 lg:max-w-md">
            
            <!-- MODUL GEMINI -->
            <div class="bg-[#13161c] border border-gray-800 rounded-lg p-3 flex flex-col space-y-2">
                <div class="text-[11px] font-bold text-gray-400 uppercase border-b border-gray-800 pb-1 flex justify-between">
                    <span>🤖 E-Check Keaslian Foto Odo</span>
                    <span id="gemini_status_badge" class="text-[9px] bg-[#2d323f] text-gray-400 px-1.5 py-0.5 rounded font-mono">READY</span>
                </div>
                
                <div class="flex items-center bg-[#2d323f] rounded px-2 py-1 text-[10px] font-mono text-gray-400 border border-gray-700/50">
                    <span class="w-16 font-bold">GEMINI KEY</span>
                    <input type="password" id="gemini_key_input" class="w-full bg-transparent text-white outline-none" placeholder="Paste API Key di sini" onchange="localStorage.setItem('gemini_api_key', this.value.trim())">
                </div>
                
                <div class="flex gap-2">
                    <input type="file" id="gemini_image_input" accept="image/*" class="hidden" onchange="previewGeminiImage(event)">
                    <button onclick="document.getElementById('gemini_image_input').click()" class="bg-[#2d323f] border border-gray-700 text-white font-mono text-[10px] py-1.5 px-2 rounded flex-1">📷 Pilih Foto Odo</button>
                    <button id="btn_gemini_check" onclick="cekKeaslianGemini()" class="bg-[#0a84ff] text-white font-mono text-[10px] py-1.5 px-3 rounded disabled:bg-gray-700" disabled>PERIKSA</button>
                </div>

                <div id="gemini_result_box" class="hidden p-2 rounded border font-mono text-[10px] leading-relaxed transition-all">
                    <div class="flex justify-between font-bold mb-1 border-b border-white/10">
                        <span>HASIL ANALISIS:</span>
                        <span>CONFIDENCE: <span id="gemini_pct">-</span>%</span>
                    </div>
                    <p id="gemini_desc" class="text-gray-200"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let geminiBase64Str = "";
        
        // Memuat API Key saat aplikasi terbuka
        window.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) document.getElementById('gemini_key_input').value = savedKey;
        });

        function previewGeminiImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    geminiBase64Str = e.target.result.split(',')[1];
                    document.getElementById('btn_gemini_check').disabled = false;
                };
                reader.readAsDataURL(file);
            }
        }

        async function cekKeaslianGemini() {
            const apiKey = document.getElementById('gemini_key_input').value.trim();
            if (!apiKey) return alert("Masukkan API Key terlebih dahulu!");

            const badge = document.getElementById("gemini_status_badge");
            const btn = document.getElementById("btn_gemini_check");
            const resultBox = document.getElementById("gemini_result_box");

            badge.innerText = "CHECKING...";
            btn.disabled = true;

            const payload = { contents: [{ parts: [{ text: "Analisis apakah foto spidometer ini asli atau jepretan layar monitor. Balas dalam JSON murni: {\"pernyataan\": \"...\", \"persentase\": 90}" }, { inlineData: { mimeType: "image/jpeg", data: geminiBase64Str } }] }] };

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const jsonRes = await res.json();
                const parsed = JSON.parse(jsonRes.candidates[0].content.parts[0].text.trim());

                document.getElementById('gemini_pct').innerText = parsed.persentase;
                document.getElementById('gemini_desc').innerText = parsed.pernyataan;
                resultBox.classList.remove("hidden");
                
                const isFake = parsed.pernyataan.toLowerCase().includes("layar") || parsed.pernyataan.toLowerCase().includes("monitor");
                resultBox.className = isFake ? "block p-2 rounded border bg-red-950/40 border-red-500/50 text-red-300" : "block p-2 rounded border bg-green-950/40 border-green-500/50 text-green-300";
                badge.innerText = isFake ? "WARNING SCREEN" : "VERIFIED REAL";
                badge.className = isFake ? "text-[9px] bg-red-600 text-white px-1.5 py-0.5 rounded font-mono font-bold" : "text-[9px] bg-green-600 text-white px-1.5 py-0.5 rounded font-mono font-bold";
            } catch(e) {
                alert("Gagal koneksi ke API Gemini.");
            } finally {
                btn.disabled = false;
            }
        }

        function resetForm() {
            document.getElementById("entry_plat").value = "";
            document.getElementById("gemini_image_input").value = "";
            document.getElementById("gemini_result_box").classList.add("hidden");
            document.getElementById("gemini_status_badge").innerText = "READY";
        }
    </script>
</body>
</html>
