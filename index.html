<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator BBM Cloud Pro - Log Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #1e222b;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-[#1e222b] border border-gray-700 shadow-2xl flex flex-col overflow-hidden rounded-lg">
        
        <div class="bg-[#f3c623] text-black font-black text-center text-xs tracking-widest py-1.5 select-none">
            P A P I P A
        </div>

        <div class="flex-1 flex flex-col p-4 space-y-4">
            
            <div class="grid grid-cols-3 gap-2 items-center">
                <div class="col-span-2 flex items-center bg-[#2d323f] rounded px-3 py-2 text-[11px] font-bold text-[#a0a5b5]">
                    <span class="mr-2">PLAT</span>
                    <input type="text" id="entry_plat" class="w-full bg-transparent text-white font-normal uppercase outline-none" placeholder="B 1234 X">
                </div>
                <button onclick="cekPlat()" id="btn_cek" class="h-full bg-[#ff9f0a] text-white font-bold rounded text-xs hover:opacity-80 py-2">CEK</button>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <div class="flex flex-col bg-[#2d323f] rounded p-2 text-[10px] font-bold text-[#a0a5b5]">
                    <span class="mb-1">START</span>
                    <input type="number" id="entry_start" class="bg-transparent text-white text-sm font-normal outline-none">
                </div>
                <div class="flex flex-col bg-[#2d323f] rounded p-2 text-[10px] font-bold text-[#a0a5b5]">
                    <span class="mb-1">AKHIR</span>
                    <input type="number" id="entry_akhir" class="bg-transparent text-white text-sm font-normal outline-none">
                </div>
                <div class="flex flex-col bg-[#2d323f] rounded p-2 text-[10px] font-bold text-[#a0a5b5]">
                    <span class="mb-1">LITER</span>
                    <input type="number" id="entry_liter" class="bg-transparent text-white text-sm font-normal outline-none">
                </div>
            </div>

            <div class="flex items-center bg-[#2d323f] rounded px-3 py-2 text-[11px] font-bold text-[#a0a5b5]">
                <span class="mr-3">RMK</span>
                <input type="text" id="entry_remark" class="w-full bg-transparent text-white font-normal outline-none" placeholder="-">
            </div>

            <div class="grid grid-cols-3 items-center bg-[#2d323f] px-3 py-2.5 rounded text-center">
                <span id="label_hasil" class="text-[#34c759] font-bold text-base border-r border-gray-700">- KM/L</span>
                <span id="label_jarak" class="text-[#a0a5b5] text-xs border-r border-gray-700">Jarak: -</span>
                <div class="flex justify-center">
                    <span id="label_status" class="text-white font-bold text-xs px-2 py-0.5 rounded bg-gray-800 min-w-[60px] text-center">-</span>
                </div>
            </div>

            <div class="grid grid-cols-4 gap-1.5 text-xs font-bold">
                <button onclick="hitungRasio()" class="bg-[#34c759] text-white py-2.5 rounded hover:opacity-80">HITUNG</button>
                <button onclick="simpanKeCloud()" id="btn_save" class="bg-[#3a3f4d] text-white py-2.5 rounded hover:opacity-80">SAVE</button>
                <button onclick="lihatHistori()" class="bg-[#0a84ff] text-white py-2.5 rounded hover:opacity-80">LOG</button>
                <button onclick="resetForm()" class="bg-[#3a3f4d] text-white py-2.5 rounded hover:opacity-80">RESET</button>
            </div>

            <hr class="border-gray-700">

            <div class="bg-[#2d323f] p-3 rounded flex flex-col space-y-2">
                <p id="label_rekues" class="text-[11px] italic text-gray-300 leading-relaxed">
                    Rekues ulang ketika masuk ratio 1:12 (1 lt untuk 12km) penggunaan sementara 1:... Km dari rekues sebelumnya ... liter
                </p>
                <button onclick="copasTeks('label_rekues', this)" class="w-full bg-[#3a3f4d] text-white text-xs font-bold py-1.5 rounded hover:opacity-80 transition-colors">
                    Copas Teks Rekues
                </button>
            </div>

            <div class="flex flex-col space-y-2">
                <select id="menu_var" class="w-full bg-[#2d323f] text-white text-[11px] p-2.5 rounded outline-none border border-transparent focus:border-gray-600">
                    <option value="">-- Pilih Teks Tambahan --</option>
                    <option value="Koordinasi dengan NDS ( Vania +62 895-3221-73069) untuk registrasi site..">Koordinasi dengan NDS ( Vania +62 895-3221-73069) untuk registrasi site..</option>
                    <option value="Approve with remark - Next rekues mohon tambahkan justifikasi terkait kendala dilapangan.">Approve with remark - Next rekues mohon tambahkan justifikasi terkait kendala dilapangan.</option>
                    <option value="Revisi site id sesuaikan dengan wo yang diupload.">Revisi site id sesuaikan dengan wo yang diupload.</option>
                    <option value="Revisi status SL id, tunggu hingga approve ROH ( Instalation ).">Revisi status SL id, tunggu hingga approve ROH ( Instalation ).</option>
                    <option value="Revisi items cost . &quot;kurir reguler&quot; hanya untuk pengiriman dokumen, untuk pengiriman barang gunakan item cost &quot;Delivery Material Perorangan&quot; atau &quot;Delivery Material Badan&quot;.">Revisi items cost . "kurir reguler" hanya untuk pengiriman dokumen, untuk pengiriman barang gunakan item cost "Delivery Material Perorangan" atau "Delivery Material Badan".</option>
                    <option value="Revisi item cost, Untuk Request Pengiriman Barang /Material dengan biaya 100rb lebih ,tolong menggunakan Item cost Delivery Material Perorangan (Travel) / Delivery Material Badan (PT).">Revisi item cost, Untuk Request Pengiriman Barang /Material dengan biaya 100rb lebih ,tolong menggunakan Item cost Delivery Material Perorangan (Travel) / Delivery Material Badan (PT).</option>
                </select>
                <button onclick="copasPilihan(this)" class="w-full bg-[#3a3f4d] text-white text-xs font-bold py-1.5 rounded hover:opacity-80 transition-colors">
                    Copas Pilihan
                </button>
            </div>

        </div>
    </div>

    <div id="modal_histori" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
        <div class="bg-[#1e222b] border border-gray-700 w-full max-w-md rounded-lg shadow-2xl p-4 flex flex-col max-h-[85vh]">
            <div class="flex justify-between items-center border-b border-gray-700 pb-2 mb-2">
                <h3 id="histori_title" class="font-bold text-sm text-[#0a84ff]">Riwayat & Edit Log</h3>
                <button onclick="tutupHistori()" class="text-red-500 font-bold text-xl hover:text-red-400 px-2">&times;</button>
            </div>
            
            <div id="histori_container" class="flex-1 overflow-y-auto space-y-3 pr-1 text-xs">
                </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://dvxnpgctebencxsqaoxo.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2eG5wZ2N0ZWJlbmN4c3Fhb3hvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNTU0NTYsImV4cCI6MjA5NzczMTQ1Nn0.bqvbF0eDfkLJhkMh9Uzid5_Or20uGTOehB3UKeecrSs";
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let data_siap_simpan = null;

        async function cekPlat() {
            const plat = document.getElementById("entry_plat").value.trim().toUpperCase();
            if (!plat) { return alert("Isi kolom PLAT nomor terlebih dahulu!"); }
            
            const btnCek = document.getElementById("btn_cek");
            btnCek.innerText = "...";
            btnCek.disabled = true;

            try {
                const { data, error } = await _supabase
                    .from('log_bbm')
                    .select('*')
                    .eq('plat_nomor', plat)
                    .order('id', { ascending: false })
                    .limit(1);

                if (error) throw error;

                if (data && data.length > 0) {
                    const lastData = data[0];
                    document.getElementById("entry_start").value = lastData.km_akhir;
                    document.getElementById("entry_akhir").value = "";
                    
                    const rem = lastData.remark || "-";
                    document.getElementById("label_rekues").innerText = `Last Log ${plat} -> Liter: ${lastData.liter}L | Rasio: ${lastData.rasio} KM/L | Rem: ${rem}`;
                    document.getElementById("entry_akhir").focus();
                } else {
                    alert(`Plat nomor ${plat} belum memiliki histori di cloud. Silakan isi manual.`);
                    document.getElementById("label_rekues").innerText = "Data baru. Silakan masukkan data awal secara lengkap.";
                }
            } catch (err) {
                alert("Gagal terhubung ke database online:\n" + err.message);
            } finally {
                btnCek.innerText = "CEK";
                btnCek.disabled = false;
            }
        }

        function hitungRasio() {
            const plat = document.getElementById("entry_plat").value.trim().toUpperCase();
            const km_start = parseFloat(document.getElementById("entry_start").value);
            const km_akhir = parseFloat(document.getElementById("entry_akhir").value);
            const liter = parseFloat(document.getElementById("entry_liter").value);

            if (!plat || isNaN(km_start) || isNaN(km_akhir) || isNaN(liter)) {
                return alert("Semua kolom angka harus diisi dengan benar!");
            }
            if (km_akhir < km_start) { return alert("KM Akhir tidak boleh lebih kecil dari KM Start!"); }
            if (liter <= 0) { return alert("BBM harus lebih dari 0!"); }

            const jarak = km_akhir - km_start;
            const rasio = jarak / liter;

            document.getElementById("label_jarak").innerText = `Jarak: ${jarak.toFixed(1)}K`;
            document.getElementById("label_hasil").innerText = `${rasio.toFixed(2)} KM/L`;

            let kesimpulan, bgWarna;
            if (rasio < 11.0) { kesimpulan = "KURANG"; bgWarna = "#ff3b30"; }
            else if (rasio <= 12.0) { kesimpulan = "CUKUP"; bgWarna = "#ff9f0a"; }
            else { kesimpulan = "JOSJIS"; bgWarna = "#34c759"; }

            const lblStatus = document.getElementById("label_status");
            lblStatus.innerText = kesimpulan;
            lblStatus.style.backgroundColor = bgWarna;

            document.getElementById("label_rekues").innerText = `Rekues ulang ketika masuk ratio 1:12 (1 lt untuk 12km) penggunaan sementara 1:${rasio.toFixed(1)} Km dari rekues sebelumnya ${liter.toFixed(1)} liter`;

            data_siap_simpan = { 
                plat_nomor: plat, 
                km_start: km_start, 
                km_akhir: km_akhir, 
                jarak: jarak, 
                liter: liter, 
                rasio: parseFloat(rasio.toFixed(2)), 
                status: kesimpulan 
            };
            document.getElementById("btn_save").style.backgroundColor = "#0a84ff";
        }

        async function simpanKeCloud() {
            if (!data_siap_simpan) { return alert("Hitung rasio terlebih dahulu!"); }
            
            const btnSave = document.getElementById("btn_save");
            const remark_text = document.getElementById("entry_remark").value.trim();
            data_siap_simpan["remark"] = remark_text ? remark_text : null;
            
            btnSave.innerText = "...";
            btnSave.disabled = true;

            try {
                const { error } = await _supabase
                    .from('log_bbm')
                    .insert([data_siap_simpan]);

                if (error) throw error;

                alert(`Sukses: Data ${data_siap_simpan.plat_nomor} berhasil disimpan!`);
                data_siap_simpan = null;
                btnSave.style.backgroundColor = "#3a3f4d";
            } catch (err) {
                alert("Gagal menyimpan ke Cloud:\n" + err.message);
            } finally {
                btnSave.innerText = "SAVE";
                btnSave.disabled = false;
            }
        }

        async function lihatHistori() {
            const plat = document.getElementById("entry_plat").value.trim().toUpperCase();
            if (!plat) { return alert("Isi plat nomor dulu!"); }

            try {
                const { data, error } = await _supabase
                    .from('log_bbm')
                    .select('*')
                    .eq('plat_nomor', plat)
                    .order('id', { ascending: false })
                    .limit(10);

                if (error) throw error;
                if (!data || data.length === 0) { return alert("Tidak ada riwayat untuk plat ini."); }

                document.getElementById("histori_title").innerText = `Histori & Edit: ${plat}`;
                const container = document.getElementById("histori_container");
                container.innerHTML = ""; 

                data.forEach((r) => {
                    const tgl = r.tanggal ? r.tanggal.split("T")[0] : (r.created_at ? r.created_at.split("T")[0] : "-");
                    
                    const logCard = document.createElement("div");
                    logCard.className = "bg-[#2d323f] p-3 rounded border border-gray-700 flex flex-col space-y-2";
                    logCard.innerHTML = `
                        <div class="flex justify-between text-[10px] text-gray-400 font-bold border-b border-gray-600 pb-1 mb-1">
                            <span>ID Data: ${r.id} (${tgl})</span>
                            <span class="text-[#34c759] font-black">${r.rasio} KM/L (${r.status})</span>
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            <div>
                                <label class="text-[9px] text-gray-400 block font-bold">START</label>
                                <input type="number" id="edit_start_${r.id}" value="${r.km_start}" class="w-full bg-[#1e222b] px-1.5 py-1 text-white rounded outline-none border border-gray-600">
                            </div>
                            <div>
                                <label class="text-[9px] text-gray-400 block font-bold">AKHIR</label>
                                <input type="number" id="edit_akhir_${r.id}" value="${r.km_akhir}" class="w-full bg-[#1e222b] px-1.5 py-1 text-white rounded outline-none border border-gray-600">
                            </div>
                            <div>
                                <label class="text-[9px] text-gray-400 block font-bold">LITER</label>
                                <input type="number" id="edit_liter_${r.id}" value="${r.liter}" class="w-full bg-[#1e222b] px-1.5 py-1 text-white rounded outline-none border border-gray-600">
                            </div>
                        </div>
                        <div>
                            <label class="text-[9px] text-gray-400 block font-bold">REMARK</label>
                            <input type="text" id="edit_remark_${r.id}" value="${r.remark || ''}" class="w-full bg-[#1e222b] px-2 py-1 text-white rounded outline-none border border-gray-600" placeholder="-">
                        </div>
                        <div class="flex justify-end pt-1">
                            <button onclick="updateLog(${r.id})" id="btn_update_${r.id}" class="w-full bg-[#0a84ff] text-white py-1.5 rounded text-[11px] font-bold hover:opacity-90">
                                SIMPAN PERUBAHAN DATA #${r.id}
                            </button>
                        </div>
                    `;
                    container.appendChild(logCard);
                });

                document.getElementById("modal_histori").style.display = "flex";
            } catch (err) {
                alert("Gagal mengambil data riwayat:\n" + err.message);
            }
        }

        async function updateLog(id) {
            const start = parseFloat(document.getElementById(`edit_start_${id}`).value);
            const akhir = parseFloat(document.getElementById(`edit_akhir_${id}`).value);
            const liter = parseFloat(document.getElementById(`edit_liter_${id}`).value);
            const remark = document.getElementById(`edit_remark_${id}`).value.trim();

            if (isNaN(start) || isNaN(akhir) || isNaN(liter)) {
                return alert("Kolom data angka tidak boleh kosong!");
            }
            if (akhir < start) { return alert("KM Akhir tidak boleh lebih kecil dari KM Start!"); }
            if (liter <= 0) { return alert("Liter harus lebih besar dari 0!"); }

            const jarak = akhir - start;
            const rasio = parseFloat((jarak / liter).toFixed(2));
            let status;
            if (rasio < 11.0) status = "KURANG";
            else if (rasio <= 12.0) status = "CUKUP";
            else status = "JOSJIS";

            const btnUpdate = document.getElementById(`btn_update_${id}`);
            const textLama = btnUpdate.innerText;
            btnUpdate.innerText = "Memproses ke Cloud...";
            btnUpdate.disabled = true;

            try {
                // Eksekusi Update ke Database Supabase
                const { data, error, status: responseStatus } = await _supabase
                    .from('log_bbm')
                    .update({ 
                        km_start: start, 
                        km_akhir: akhir, 
                        liter: liter, 
                        jarak: jarak,
                        rasio: rasio,
                        status: status,
                        remark: remark ? remark : null 
                    })
                    .eq('id', id)
                    .select(); // Mengembalikan data hasil update untuk validasi keberhasilan

                if (error) {
                    throw error;
                }

                // Proteksi jika RLS menolak diam-diam (berhasil 200/204 tapi data kembali kosong)
                if (!data || data.length === 0) {
                    throw new Error("Data gagal diperbarui. Kemungkinan RLS (Row Level Security) 'UPDATE' di Supabase belum diaktifkan.");
                }

                alert(`Sukses! Log ID #${id} berhasil diperbarui.`);
                lihatHistori(); // Memperbarui tampilan isi list log terbaru
            } catch (err) {
                alert("Gagal Update Data ke Cloud!\n\nAlasan Eror:\n" + err.message);
            } finally {
                if(document.getElementById(`btn_update_${id}`)) {
                    document.getElementById(`btn_update_${id}`).innerText = textLama;
                    document.getElementById(`btn_update_${id}`).disabled = false;
                }
            }
        }

        function tutupHistori() { document.getElementById("modal_histori").style.display = "none"; }

        function copasTeks(id, btn) {
            const text = document.getElementById(id).innerText;
            if(text.includes("...")) return alert("Hitung dulu!");
            navigator.clipboard.writeText(text).then(() => {
                btn.innerText = "Sukses Disalin!";
                setTimeout(() => btn.innerText = "Copas Teks Rekues", 1000);
            });
        }

        function copasPilihan(btn) {
            const val = document.getElementById("menu_var").value;
            if(!val) return alert("Pilih teks dulu!");
            navigator.clipboard.writeText(val).then(() => {
                btn.innerText = "Sukses!";
                setTimeout(() => btn.innerText = "Copas Pilihan", 1000);
            });
        }

        function resetForm() {
            data_siap_simpan = null;
            ['entry_plat', 'entry_start', 'entry_akhir', 'entry_liter', 'entry_remark'].forEach(id => document.getElementById(id).value = "");
            document.getElementById("label_jarak").innerText = "Jarak: -";
            document.getElementById("label_hasil").innerText = "- KM/L";
            document.getElementById("label_status").innerText = "-";
            document.getElementById("label_status").style.backgroundColor = "transparent";
            document.getElementById("label_rekues").innerText = "Rekues ulang ketika masuk ratio 1:12 (1 lt untuk 12km) penggunaan sementara 1:... Km dari rekues sebelumnya ... liter";
            document.getElementById("btn_save").style.backgroundColor = "#3a3f4d";
        }
    </script>
</body>
</html>
