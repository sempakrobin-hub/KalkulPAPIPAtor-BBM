<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator BBM</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #121214; color: #e1e1e6; }
    </style>
</head>
<body class="flex justify-center items-top min-h-screen p-4 font-sans">

    <div class="w-full max-w-md bg-[#1a1a1e] rounded-2xl shadow-xl border border-[#29292e] p-6 space-y-6">
        
        <h1 class="text-xl font-bold text-center tracking-wide text-gray-200">Kalkulator BBM</h1>
        
        <div class="grid grid-cols-3 gap-3">
            <div>
                <label class="block text-xs text-gray-400 font-semibold mb-1 text-center">START</label>
                <input type="number" id="start" placeholder="0.0" class="w-full bg-[#29292e] border border-[#3a3a40] rounded-xl py-3 px-2 text-center text-white focus:outline-none focus:border-green-500 font-mono text-lg">
            </div>
            <div>
                <label class="block text-xs text-gray-400 font-semibold mb-1 text-center">AKHIR</label>
                <input type="number" id="akhir" placeholder="0.0" class="w-full bg-[#29292e] border border-[#3a3a40] rounded-xl py-3 px-2 text-center text-white focus:outline-none focus:border-green-500 font-mono text-lg">
            </div>
            <div>
                <label class="block text-xs text-gray-400 font-semibold mb-1 text-center">LITER</label>
                <input type="number" id="liter" placeholder="0.0" class="w-full bg-[#29292e] border border-[#3a3a40] rounded-xl py-3 px-2 text-center text-white focus:outline-none focus:border-green-500 font-mono text-lg">
            </div>
        </div>

        <div class="flex gap-3">
            <button onclick="hitungRasio()" class="flex-1 bg-[#34c759] hover:bg-green-600 text-black font-bold py-3 rounded-xl transition duration-200 text-base active:scale-98">
                HITUNG
            </button>
            <button onclick="resetForm()" class="w-20 bg-[#3a3f4d] hover:bg-gray-650 text-white font-semibold py-3 rounded-xl transition duration-200 text-base active:scale-98">
                Reset
            </button>
        </div>

        <div class="grid grid-cols-3 gap-2 bg-[#222226] border border-[#29292e] rounded-xl p-3 text-center items-center">
            <div>
                <div id="label_hasil" class="text-lg font-mono font-bold text-[#34c759]">- KM/L</div>
            </div>
            <div>
                <div id="label_jarak" class="text-sm text-gray-300 font-medium">Jrk: -</div>
            </div>
            <div>
                <span id="label_status" class="text-sm font-bold px-2 py-1 rounded bg-[#29292e] text-gray-400">-</span>
            </div>
        </div>

        <div class="bg-[#222226] border border-[#29292e] rounded-xl p-4 space-y-3">
            <p id="label_rekues" class="text-xs text-gray-400 leading-relaxed min-h-[40px]">
                Rekues ulang ketika masuk ratio 1:12 (1 lt untuk 12km) penggunaan sementara 1:... Km dari rekues sebelumnya ... liter
            </p>
            <div class="flex justify-end">
                <button id="btn_copas" onclick="copasTeks('label_rekues', 'btn_copas', 'Copas')" class="bg-[#3a3f4d] text-xs text-gray-200 px-4 py-2 rounded-lg font-medium active:scale-95 transition">
                    Copas
                </button>
            </div>
        </div>

        <div class="flex flex-col gap-2.5 bg-[#222226] border border-[#29292e] rounded-xl p-3.5">
            <label class="block text-xs font-semibold text-gray-400 tracking-wider">TEKS TAMBAHAN</label>
            <select id="spinner" class="w-full bg-[#29292e] border border-[#3a3a40] rounded-xl p-3 text-xs text-gray-300 focus:outline-none focus:border-green-500 truncate cursor-pointer">
                <option value="">-- Pilih Teks Tambahan --</option>
                <option value="Koordinasi dengan NDS ( Vania +62 895-3221-73069) untuk registrasi site..">Koordinasi dengan NDS ( Vania +62 895-3221-73069) untuk registrasi site..</option>
                <option value="Approve with remark - Next rekues mohon tambahkan justifikasi terkait kendala dilapangan.">Approve with remark - Next rekues mohon tambahkan justifikasi terkait kendala dilapangan.</option>
                <option value="Revisi site id sesuaikan dengan wo yang diupload.">Revisi site id sesuaikan dengan wo yang diupload.</option>
                <option value="Revisi status SL id, tunggu hingga approve ROH ( Instalation ).">Revisi status SL id, tunggu hingga approve ROH ( Instalation ).</option>
                <option value="Revisi items cost . &quot;kurir reguler&quot; hanya untuk pengiriman dokumen...">Revisi items cost . "kurir reguler" hanya untuk pengiriman dokumen...</option>
                <option value="Revisi item cost, Untuk Request Pengiriman Barang /Material dengan biaya 100rb lebih...">Revisi item cost, Untuk Request Pengiriman Barang /Material dengan biaya 100rb lebih...</option>
            </select>
            <button id="btn_copas_pilihan" onclick="copasPilihan()" class="w-full bg-[#3a3f4d] text-xs text-gray-200 py-3 rounded-xl font-bold active:scale-98 transition tracking-wide shadow-sm">
                Copas Pilihan
            </button>
        </div>

    </div>

    <script>
        const templateAwal = "Rekues ulang ketika masuk ratio 1:12 (1 lt untuk 12km) penggunaan sementara 1:... Km dari rekues sebelumnya ... liter";
        let teksHasilTemplate = templateAwal;

        function hitungRasio() {
            const start = parseFloat(document.getElementById('start').value);
            const akhir = parseFloat(document.getElementById('akhir').value);
            const liter = parseFloat(document.getElementById('liter').value);

            if (isNaN(start) || isNaN(akhir) || isNaN(liter) || akhir < start || liter <= 0) {
                alert("Mohon masukkan angka yang valid (AKHIR harus lebih besar dari START & LITER tidak boleh 0)!");
                return;
            }

            const jarak = akhir - start;
            const rasio = jarak / liter;

            document.getElementById('label_jarak').innerText = `Jrk: ${jarak.toFixed(1)}K`;
            document.getElementById('label_hasil').innerText = `${rasio.toFixed(2)} KM/L`;

            const statusEl = document.getElementById('label_status');
            if (rasio < 11.0) {
                statusEl.innerText = "KURANG";
                statusEl.className = "text-xs font-bold px-2 py-1 rounded bg-red-950 text-[#ff3b30]";
            } else if (rasio >= 11.0 && rasio <= 12.0) {
                statusEl.innerText = "CUKUP";
                statusEl.className = "text-xs font-bold px-2 py-1 rounded bg-orange-950 text-[#ff9f0a]";
            } else {
                statusEl.innerText = "JOSJIS";
                statusEl.className = "text-xs font-bold px-2 py-1 rounded bg-green-950 text-[#34c759]";
            }

            teksHasilTemplate = `Rekues ulang ketika masuk ratio 1:12 (1 lt untuk 12km) penggunaan sementara 1:${rasio.toFixed(1)} Km dari rekues sebelumnya ${liter.toFixed(1)} liter`;
            document.getElementById('label_rekues').innerText = teksHasilTemplate;
        }

        function copasTeks(elementId, buttonId, teksAsli) {
            const text = document.getElementById(elementId).innerText;
            if (text === templateAwal || text.trim() === "") return;

            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById(buttonId);
                btn.innerText = "Suks!";
                btn.classList.replace('bg-[#3a3f4d]', 'bg-[#34c759]');
                btn.classList.replace('text-gray-200', 'text-black');
                setTimeout(() => {
                    btn.innerText = teksAsli;
                    btn.classList.replace('bg-[#34c759]', 'bg-[#3a3f4d]');
                    btn.classList.replace('text-black', 'text-gray-200');
                }, 1000);
            });
        }

        function copasPilihan() {
            const select = document.getElementById('spinner');
            const nilai = select.value;
            if (!nilai) return;

            navigator.clipboard.writeText(nilai).then(() => {
                const btn = document.getElementById('btn_copas_pilihan');
                btn.innerText = "Suks!";
                btn.classList.replace('bg-[#3a3f4d]', 'bg-[#34c759]');
                btn.classList.replace('text-gray-200', 'text-black');
                setTimeout(() => {
                    btn.innerText = "Copas Pilihan";
                    btn.classList.replace('bg-[#34c759]', 'bg-[#3a3f4d]');
                    btn.classList.replace('text-black', 'text-gray-200');
                }, 1000);
            });
        }

        function resetForm() {
            document.getElementById('start').value = '';
            document.getElementById('akhir').value = '';
            document.getElementById('liter').value = '';
            document.getElementById('label_jarak').innerText = 'Jrk: -';
            document.getElementById('label_hasil').innerText = '- KM/L';
            
            const statusEl = document.getElementById('label_status');
            statusEl.innerText = '-';
            statusEl.className = "text-xs font-bold px-2 py-1 rounded bg-[#29292e] text-gray-400";
            
            teksHasilTemplate = templateAwal;
            document.getElementById('label_rekues').innerText = templateAwal;
            document.getElementById('spinner').value = '';
        }
    </script>
</body>
</html>
